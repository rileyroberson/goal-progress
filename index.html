<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Progress</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #121820;
      --surface: #1a2230;
      --surface-2: #222e3f;
      --blue: #7eb8da;
      --blue-dim: rgba(126, 184, 218, 0.15);
      --orange: #e8b88a;
      --orange-dim: rgba(232, 184, 138, 0.15);
      --text: #d5dde6;
      --text-muted: #7a8a9e;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--surface-2);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--blue);
      margin-bottom: 32px;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .field.goal label { color: var(--blue); }
    .field.progress label { color: var(--orange); }

    .input-wrap {
      position: relative;
    }

    .input-wrap .prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--surface-2);
      border-radius: var(--radius);
      padding: 12px 14px 12px 28px;
      font-size: 1.1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .field.goal input:focus { border-color: var(--blue); }
    .field.progress input:focus { border-color: var(--orange); }

    .bar-container {
      background: var(--bg);
      border-radius: 20px;
      height: 36px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--surface-2);
    }

    .bar-fill {
      height: 100%;
      border-radius: 20px;
      background: linear-gradient(90deg, var(--blue), var(--orange));
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .bar-fill.overshoot {
      background: linear-gradient(90deg, var(--blue), #8ad4a0);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 20px;
    }

    .percent {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--blue), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .remaining {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: right;
    }

    .remaining span {
      display: block;
      color: var(--orange);
      font-size: 1.05rem;
      font-weight: 600;
      margin-top: 2px;
    }

    .done-msg {
      display: none;
      text-align: center;
      margin-top: 16px;
      color: #8ad4a0;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .done-msg.visible { display: block; }

    .divider {
      height: 1px;
      background: var(--surface-2);
      margin: 36px 0 32px;
    }

    .field input[type="date"] {
      padding-left: 14px;
      color-scheme: dark;
      font-family: inherit;
    }

    @media (max-width: 400px) {
      .card { padding: 24px; }
      .percent { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Goal Progress</h1>

    <div class="inputs">
      <div class="field progress">
        <label>Saved</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="text" id="saved" inputmode="decimal" placeholder="12,500">
        </div>
      </div>
      <div class="field goal">
        <label>Goal</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="text" id="goal" inputmode="decimal" placeholder="50,000">
        </div>
      </div>
    </div>

    <div class="bar-container">
      <div class="bar-fill" id="bar"></div>
    </div>

    <div class="stats">
      <div class="percent" id="pct">0%</div>
      <div class="remaining">
        remaining
        <span id="remaining">$0</span>
      </div>
    </div>

    <div class="done-msg" id="done">Goal reached!</div>

    <div class="divider"></div>

    <div class="inputs">
      <div class="field progress">
        <label>Start Date</label>
        <div class="input-wrap">
          <input type="date" id="startDate">
        </div>
      </div>
      <div class="field goal">
        <label>Goal Date</label>
        <div class="input-wrap">
          <input type="date" id="goalDate">
        </div>
      </div>
    </div>

    <div class="bar-container">
      <div class="bar-fill" id="timeBar"></div>
    </div>

    <div class="stats">
      <div class="percent" id="timePct">0%</div>
      <div class="remaining">
        time remaining
        <span id="timeRemaining">—</span>
      </div>
    </div>

    <div class="done-msg" id="timeDone">Goal date reached!</div>
  </div>

  <script>
    const goalInput = document.getElementById('goal');
    const savedInput = document.getElementById('saved');
    const bar = document.getElementById('bar');
    const pctEl = document.getElementById('pct');
    const remainEl = document.getElementById('remaining');
    const doneEl = document.getElementById('done');

    function parseNum(str) {
      return parseFloat(str.replace(/[^0-9.]/g, '')) || 0;
    }

    function formatMoney(n) {
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function formatInput(input) {
      const pos = input.selectionStart;
      const raw = input.value;
      const num = parseNum(raw);
      if (raw === '' || raw === '.') return;
      const formatted = num.toLocaleString('en-US');
      const diff = formatted.length - raw.length;
      input.value = formatted;
      input.setSelectionRange(pos + diff, pos + diff);
    }

    function update() {
      const goal = parseNum(goalInput.value);
      const saved = parseNum(savedInput.value);

      if (goal <= 0) {
        bar.style.width = '0%';
        pctEl.textContent = '0%';
        remainEl.textContent = formatMoney(0);
        doneEl.classList.remove('visible');
        bar.classList.remove('overshoot');
        return;
      }

      const pct = Math.min((saved / goal) * 100, 100);
      const remaining = Math.max(goal - saved, 0);

      bar.style.width = pct + '%';
      bar.classList.toggle('overshoot', saved >= goal);
      pctEl.textContent = pct.toFixed(1).replace(/\.0$/, '') + '%';
      remainEl.textContent = formatMoney(remaining);
      doneEl.classList.toggle('visible', saved >= goal);
    }

    [goalInput, savedInput].forEach(input => {
      input.addEventListener('input', () => {
        formatInput(input);
        update();
      });
    });

    // ── Time progress ──
    const startInput = document.getElementById('startDate');
    const goalDateInput = document.getElementById('goalDate');
    const timeBar = document.getElementById('timeBar');
    const timePctEl = document.getElementById('timePct');
    const timeRemainEl = document.getElementById('timeRemaining');
    const timeDoneEl = document.getElementById('timeDone');

    const MS_PER_DAY = 86400000;

    function parseDate(str) {
      if (!str) return null;
      const [y, m, d] = str.split('-').map(Number);
      if (!y || !m || !d) return null;
      return new Date(y, m - 1, d);
    }

    function toISODate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function today() {
      const n = new Date();
      return new Date(n.getFullYear(), n.getMonth(), n.getDate());
    }

    function formatDuration(days) {
      if (days <= 0) return '0 days';
      if (days < 45) return days + (days === 1 ? ' day' : ' days');
      const months = Math.floor(days / 30.44);
      if (months < 12) {
        const remDays = Math.round(days - months * 30.44);
        return months + ' mo' + (remDays > 0 ? ' ' + remDays + ' d' : '');
      }
      const years = Math.floor(months / 12);
      const remMonths = months % 12;
      return years + ' yr' + (remMonths > 0 ? ' ' + remMonths + ' mo' : '');
    }

    function updateTime() {
      const start = parseDate(startInput.value);
      const goalDate = parseDate(goalDateInput.value);
      const now = today();

      if (!start || !goalDate || goalDate <= start) {
        timeBar.style.width = '0%';
        timeBar.classList.remove('overshoot');
        timePctEl.textContent = '0%';
        timeRemainEl.textContent = '—';
        timeDoneEl.classList.remove('visible');
        return;
      }

      const total = goalDate - start;
      const elapsed = now - start;
      const pct = Math.min(Math.max((elapsed / total) * 100, 0), 100);
      const daysLeft = Math.max(Math.ceil((goalDate - now) / MS_PER_DAY), 0);
      const reached = now >= goalDate;

      timeBar.style.width = pct + '%';
      timeBar.classList.toggle('overshoot', reached);
      timePctEl.textContent = pct.toFixed(1).replace(/\.0$/, '') + '%';
      timeRemainEl.textContent = formatDuration(daysLeft);
      timeDoneEl.classList.toggle('visible', reached);
    }

    // Default the start date to the savings start.
    startInput.value = '2026-04-26';

    [startInput, goalDateInput].forEach(input => {
      input.addEventListener('input', updateTime);
    });

    updateTime();
  </script>
</body>
</html>
